<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vote</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:min(92vw,500px);
  background:#1e1e1e;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

h1{
  font-size:2rem;
  margin-bottom:10px;
}

p{
  color:#aaa;
}

.buttons{
  display:flex;
  gap:15px;
  justify-content:center;
  margin-top:25px;
}

button{
  border:none;
  padding:18px 30px;
  font-size:1.2rem;
  font-weight:bold;
  border-radius:14px;
  cursor:pointer;
}

#yesBtn{
  background:#00c853;
  color:white;
}

#noBtn{
  background:#d50000;
  color:white;
}

#result{
  margin-top:25px;
  font-size:1.3rem;
}

#status{
  margin-top:10px;
  color:#888;
}
</style>
</head>

<body>

<div class="card">
  <h1>Vote Now</h1>
  <p>Should this happen?</p>

  <div class="buttons">
    <button id="yesBtn">YES</button>
    <button id="noBtn">NO</button>
  </div>

  <div id="result">Loading...</div>
  <div id="status"></div>
</div>

<script>
const SUPABASE_URL = "https://hlkfvhzdpxhmkansymxx.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_KEY_HERE";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const resultEl = document.getElementById("result");
const statusEl = document.getElementById("status");

async function loadVotes() {
  const { data, error } = await db
    .from("votes")
    .select("Yes, No")
    .eq("id", 1)
    .single();

  if(error){
    resultEl.textContent = "Error loading votes";
    return;
  }

  resultEl.textContent = `YES: ${data.Yes} | NO: ${data.No}`;
}

async function vote(choice){
  yesBtn.disabled = true;
  noBtn.disabled = true;
  statusEl.textContent = "Saving vote...";

  const { data, error } = await db.rpc("increment_vote", { choice });

  yesBtn.disabled = false;
  noBtn.disabled = false;

  if(error){
    statusEl.textContent = error.message;
    return;
  }

  resultEl.textContent = `YES: ${data.Yes} | NO: ${data.No}`;
  statusEl.textContent = "Vote saved!";
}

yesBtn.onclick = () => vote("Yes");
noBtn.onclick = () => vote("No");

loadVotes();
</script>

</body>
</html>
