<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIX Vote</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  color:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:min(92vw,420px);
  text-align:center;
}

.top-text{
  font-size:0.9rem;
  margin-bottom:30px;
}

.loader{
  width:60px;
  height:60px;
  border:6px solid #ddd;
  border-top:6px solid #000;
  border-radius:50%;
  margin:0 auto 20px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.date{
  font-size:0.9rem;
  margin-bottom:5px;
}

.title{
  font-size:1.6rem;
  margin-bottom:30px;
}

.question{
  font-size:1.4rem;
  font-weight:600;
  line-height:1.5;
  margin-bottom:30px;
}

.subtext{
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:20px;
  justify-content:center;
}

button{
  padding:14px 30px;
  font-size:1.1rem;
  border-radius:10px;
  border:2px solid #000;
  background:transparent;
  cursor:pointer;
}

button:hover{
  background:#000;
  color:#fff;
}

.footer{
  margin-top:50px;
  font-size:0.9rem;
}

.time{
  font-size:1.3rem;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="top-text">
    What do you think?<br>
    Interactive installation at Kunsthaus Graz
  </div>

  <div class="loader" id="loader"></div>

  <div class="date">21.04.2026</div>
  <div class="title">Todays Question</div>

  <div class="question">
    Is art allowed to do everything, even if no one likes it?
  </div>

  <div class="subtext">Your opinion is asked</div>

  <div class="buttons">
    <button id="yesBtn">YES</button>
    <button id="noBtn">NO</button>
  </div>

  <div id="result" style="margin-top:25px;"></div>

  <div class="footer">
    Voting open until
    <div class="time">10pm</div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://exmrqibjgsdmuwjoeodz.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4bXJxaWJqZ3NkbXV3am9lb2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ3NTMsImV4cCI6MjA5MjM2MDc1M30.jYknpEAU7bx71svQmFvipVm5DGWE8SwvLtfzv66Fa2U";

const db = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");
const loader = document.getElementById("loader");

function render(data){
  result.textContent =
    `YES: ${data.yes_count} | NO: ${data.no_count}`;
  loader.style.display = "none";
}

async function loadVotes(){
  const {data,error} = await db
    .from("votes")
    .select("yes_count,no_count")
    .eq("id",1)
    .single();

  if(error){
    console.error(error);
    result.textContent = error.message;
    return;
  }

  render(data);
}

async function vote(choice){
  yesBtn.disabled = true;
  noBtn.disabled = true;

  const {data,error} =
    await db.rpc("increment_vote",{choice});

  yesBtn.disabled = false;
  noBtn.disabled = false;

  if(error){
    console.error(error);
    result.textContent = error.message;
    return;
  }

  render(data);
}

yesBtn.onclick = () => vote("yes");
noBtn.onclick = () => vote("no");

loadVotes();
</script>

</body>
</html>
