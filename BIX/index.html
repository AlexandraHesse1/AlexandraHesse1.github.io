<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIX Vote</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  background:#1e1e1e;
  padding:30px;
  border-radius:20px;
  width:min(92vw,520px);
  text-align:center;
}
.buttons{
  display:flex;
  gap:16px;
  justify-content:center;
  margin-top:24px;
}
button{
  border:none;
  padding:18px 34px;
  border-radius:14px;
  font-size:1.2rem;
  font-weight:bold;
  cursor:pointer;
}
#yesBtn{background:#00c853;color:#fff;}
#noBtn{background:#d50000;color:#fff;}
#result{margin-top:24px;font-size:1.3rem;}
#status{margin-top:10px;color:#999;}
</style>
</head>

<body>

<div class="card">
<h1>Vote</h1>
<p>Should this happen?</p>

<div class="buttons">
<button id="yesBtn">YES</button>
<button id="noBtn">NO</button>
</div>

<div id="result">Loading...</div>
<div id="status"></div>
</div>

<script>
const SUPABASE_URL = "https://exmrqibjgsdmuwjoeodz.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4bXJxaWJqZ3NkbXV3am9lb2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ3NTMsImV4cCI6MjA5MjM2MDc1M30.jYknpEAU7bx71svQmFvipVm5DGWE8SwvLtfzv66Fa2U";

const db = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");
const status = document.getElementById("status");

function render(data){
  result.textContent =
    `YES: ${data.yes_count} | NO: ${data.no_count}`;
}

async function loadVotes(){
  const {data,error} = await db
    .from("votes")
    .select("yes_count,no_count")
    .eq("id",1)
    .single();

  if(error){
    console.error(error);
    result.textContent = error.message;
    return;
  }

  render(data);
}

async function vote(choice){
  yesBtn.disabled = true;
  noBtn.disabled = true;
  status.textContent = "Saving vote...";

  const {data,error} =
    await db.rpc("increment_vote",{choice});

  yesBtn.disabled = false;
  noBtn.disabled = false;

  if(error){
    console.error(error);
    status.textContent = error.message;
    return;
  }

  render(data);
  status.textContent = "Vote saved ✔";
}

yesBtn.onclick = () => vote("yes");
noBtn.onclick = () => vote("no");

loadVotes();
</script>

</body>
</html>
